<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EzReserve | Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center px-4 py-10">
    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl border border-slate-200 p-8">
        <div class="text-center mb-8">
            <div class="w-14 h-14 mx-auto rounded-2xl bg-indigo-600 text-white flex items-center justify-center text-2xl font-bold mb-4">
                E
            </div>
            <h1 class="text-2xl font-bold text-slate-900">Register Business</h1>
            <p class="text-slate-500 mt-2">Create your EzReserve account</p>
        </div>

        <form method="post" action="/register" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Business Name</label>
                <input type="text" name="business_name" required
                       class="w-full rounded-xl border border-slate-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Username</label>
                <input type="text" name="username" required
                       class="w-full rounded-xl border border-slate-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Password</label>
                <input type="password" name="password" required
                       class="w-full rounded-xl border border-slate-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>

            <button type="submit"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition">
                Create Account
            </button>
        </form>

        <p class="text-sm text-slate-500 text-center mt-6">
            Already have an account?
            <a href="/login" class="text-indigo-600 font-semibold hover:underline">Login</a>
        </p>
    </div>
</body>
</html>
